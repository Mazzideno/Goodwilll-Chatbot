<script>
  // DOM Selection Hooks
  const chatBg = document.getElementById('chatBg');
  const msgInput = document.getElementById('msgInput');
  const typingIndicator = document.getElementById('typingIndicator');
  const drawer = document.getElementById('drawer');
  const overlay = document.getElementById('ov');
  const currentTheme = document.documentElement.getAttribute('data-theme');

  // ─── THEME TOGGLE ───────────────────────────────────────
  function toggleTheme() {
    const html = document.documentElement;
    const isLight = html.getAttribute('data-theme') === 'light';
    const newTheme = isLight ? 'dark' : 'light';
    html.setAttribute('data-theme', newTheme);
    document.querySelector('.theme-btn').innerHTML = newTheme === 'light' ? '🌙' : '☀️';
  }

  // ─── DRAWER NAVIGATION ──────────────────────────────────
  function openD() {
    drawer.classList.add('open');
    overlay.classList.add('open');
  }

  function closeD() {
    drawer.classList.remove('open');
    overlay.classList.remove('open');
  }

  // ─── DROPDOWN INTERACTION TOGGLE ────────────────────────
  function toggleDD(id) {
    const trigger = document.getElementById(`trig-${id}`);
    const panel = document.getElementById(`panel-${id}`);
    
    // Close other open panels
    document.querySelectorAll('.dd-trigger').forEach(trig => {
      if(trig.id !== `trig-${id}`) trig.classList.remove('open');
    });
    document.querySelectorAll('.dd-panel').forEach(pan => {
      if(pan.id !== `panel-${id}`) pan.classList.remove('open');
    });

    // Toggle current selection
    trigger.classList.toggle('open');
    panel.classList.toggle('open');
    scrollToBottom();
  }

  // ─── RENDER CHAT BUBBLES ────────────────────────────────
  function appendMessage(sender, text, isInteractive = false) {
    const time = new Date().toLocaleTimeString('en-NG', { hour: '2-digit', minute: '2-digit', hour12: false });
    const msgDiv = document.createElement('div');
    msgDiv.className = sender === 'user' ? 'user-msg' : 'bot-msg';

    if (sender === 'bot') {
      msgDiv.innerHTML = `
        <div class="ai-badge">🤖 Bot Response</div>
        <div>${text.replace(/\n/g, '<br>')}</div>
        <div class="wa-time">${time}</div>
      `;
    } else {
      msgDiv.innerHTML = `
        <div>${text}</div>
        <div class="wa-time">${time}</div>
      `;
    }

    chatBg.appendChild(msgDiv);
    scrollToBottom();
  }

  function scrollToBottom() {
    chatBg.scrollTop = chatBg.scrollHeight;
  }

  // ─── SIMULATED CLIENT SCRIPT LOGIC ──────────────────────
  // Since this is a static showcase demo page running client-side, 
  // we simulate the bot routing array definitions locally match router.js!
  
  async function handleSend() {
    const text = msgInput.value.trim();
    if (!text) return;

    // Render User text
    appendMessage('user', text);
    msgInput.value = '';

    // Trigger Typing Animation
    typingIndicator.style.display = 'block';
    scrollToBottom();

    // Simulate backend response processing delay
    setTimeout(() => {
      typingIndicator.style.display = 'none';
      processSimulatedResponse(text.toLowerCase());
    }, 1000);
  }

  // Handle inputs/clicks via text inputs or shortcuts
  function processSimulatedResponse(input) {
    const menuTriggers = ["hi", "hello", "hey", "start", "menu", "helo", "help", "0", "back"];
    
    if (menuTriggers.includes(input)) {
      appendMessage('bot', "Goodwill Language Solution 🌍\n\nWelcome! We are certified language service providers in Africa since 2017.\n\nServing 27 countries worldwide.\n\nType a number to select a service:\n1️⃣ Document Translation\n2️⃣ Interpretation\n3️⃣ Subtitling & Voiceover\n4️⃣ Language Classes\n5️⃣ Transcription\n6️⃣ Equipment Rental\n7️⃣ Get a Quote\n8️⃣ Speak to Our Team");
      return;
    }

    switch(input) {
      case "1":
      case "translation":
        appendMessage('bot', "🔤 *Document Translation*\n\nWe translate all document types with certified linguists in 30+ languages.\n\n• Legal & Court Docs\n• Medical Reports\n• Academic Certificates\n• Business Contracts\n\nType *7* to Request a Quote or *0* to go back.");
        break;
      case "2":
      case "interpretation":
        appendMessage('bot', "🎙️ *Interpretation Services*\n\nProfessional interpretation for conferences, courts, meetings & NGO events.\n\n• Simultaneous\n• Consecutive\n• Remote / Online\n\nType *8* to speak directly with our team alignment coordinator.");
        break;
      case "3":
      case "subtitling":
        appendMessage('bot', "🎬 *Subtitling & Voiceover*\n\nWe help your content reach global audiences with native-speaker quality inside SRT, VTT & core video exports.");
        break;
      case "4":
      case "classes":
        appendMessage('bot', "📚 *Language Classes*\n\nLearn French, Arabic, Mandarin, Spanish, German or native African languages online 24/7 with expert certified live tutors.");
        break;
      case "5":
      case "transcription":
        appendMessage('bot', "📝 *Transcription Services*\n\nWe convert audio & video files to accurate, timestamped written text formats within 24-48 hours.");
        break;
      case "6":
      case "equipment":
        appendMessage('bot', "🎧 *Equipment Rental*\n\nProfessional interpretation hardware equipment kits (booths, headsets, wireless transmitters) available for deployment across Nigeria.");
        break;
      case "7":
      case "quote":
        appendMessage('bot', "💰 *Request a Quote*\n\nPlease email details to: *Translate@goodwilllanguage.com* or specify your source language pair here!");
        break;
      case "8":
      case "team":
        appendMessage('bot', "👤 *Speak to Our Team*\n\nOur Project Manager is ready to assist you directly! Call or chat: *+234 807 976 3934*");
        break;
      default:
        appendMessage('bot', "😊 Thank you for reaching out to Goodwill Language Solution!\n\nType *menu* or *0* at any time to open our main system options array.");
    }
  }

  // Handle Enter Key Press Injection
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSend();
  });

  // Load baseline initial message greeting instantly when web browser loads
  window.onload = () => {
    appendMessage('bot', "Hello! Welcome to Goodwill Language Solution interactive live sandbox test environment. Type *'hello'* or *'menu'* to begin exploring our options matrix!");
  };
</script>
